name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: mouse-share-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: mouse-share-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mouse-share-windows-x86_64
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (debug)
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: cargo build --verbose --target ${{ matrix.target }}

      - name: Test
        if: matrix.target != 'aarch64-apple-darwin'
        run: cargo test --verbose

      - name: Build (release)
        if: startsWith(github.ref, 'refs/tags/')
        run: cargo build --release --target ${{ matrix.target }}

      # ---------- Package ----------
      - name: Package (unix)
        if: startsWith(github.ref, 'refs/tags/') && runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          DIR="${{ matrix.artifact }}-${VERSION}"
          mkdir -p "$DIR"
          cp "target/${{ matrix.target }}/release/mouse-share" "$DIR/"
          cp README.md LICENSE* "$DIR/" 2>/dev/null || true
          tar czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: startsWith(github.ref, 'refs/tags/') && runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF -replace 'refs/tags/', ''
          $DIR = "${{ matrix.artifact }}-${VERSION}"
          New-Item -ItemType Directory -Path $DIR | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/mouse-share.exe" "$DIR/"
          Copy-Item "README.md" "$DIR/" -ErrorAction SilentlyContinue
          Compress-Archive -Path "$DIR/*" -DestinationPath "${DIR}.zip"
          echo "ASSET=${DIR}.zip" | Out-File -Append -FilePath $env:GITHUB_ENV

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ env.ASSET }}

  # ---------- GitHub Release ----------
  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
